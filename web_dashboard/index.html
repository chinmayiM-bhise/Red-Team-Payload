<!DOCTYPE html>
<html>
<head>

<title>Red Team Simulation Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-dark text-light">

<div class="container mt-4">

<h2 class="text-center mb-4">
Red Team Attack Simulation Lab
</h2>

<div class="row text-center">

<div class="col">
<div class="card bg-danger">
<div class="card-body">
<h5>Total Clients</h5>
<h3 id="clientCount">0</h3>
</div>
</div>
</div>

<div class="col">
<div class="card bg-warning">
<div class="card-body">
<h5>Commands Executed</h5>
<h3 id="cmdCount">0</h3>
</div>
</div>
</div>

<div class="col">
<div class="card bg-success">
<div class="card-body">
<h5>Persistence Events</h5>
<h3 id="persistCount">0</h3>
</div>
</div>
</div>

</div>

<hr>

<h4>Connected Clients</h4>

<table class="table table-dark table-striped">

<thead>
<tr>
<th>Hostname</th>
<th>IP</th>
<th>OS</th>
<th>CPU</th>
<th>RAM</th>
<th>Processes</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

<button class="btn btn-primary" onclick="loadClients()">
Refresh Clients
</button>

</div>

<script src="dashboard.js"></script>

</body>
</html>
